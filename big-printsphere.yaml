substitutions:
  homeassistant_url: #Enter your HA adress: http://homeassistant.local:8123 or https://homeassistant.local:8443
  bambulab_printer: #Enter your printer entity name from homeassistant
  bambulab_icon: images/bambuicon.png
  min_bri:    "0.05"   # wirkliches Minimum, wenn NICHT aus (5%)
  dim_factor: "0.27"   # wie stark dimmen wir im Idle? (27% der User-Helligkeit)
  ha_cam_entity_id: bigsphere_cam
  touch_wake_inverted: "true"      # CST9217 INT ist meist active-low
  touch_wakeup_pin_mode: KEEP_AWAKE  # Alternativen: IGNORE / INVERT_WAKEUP
  axp2101_repo_url: https://github.com/cptkirki/AXP2101_WS-AMOLED-1.75
  axp2101_repo_ref: v1.0.0

esphome:
  name: big-printsphere
  friendly_name: big_PrintSphere
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
    build_flags:
      -D LV_DISP_DEF_REFR_PERIOD=12
  on_boot:
    priority: -50
    then:
      - lambda: |-
          constexpr float MIN_BRI = ${min_bri}f;  // ~22 % Mindesthelligkeit
          float bri = (float)id(user_brightness) / 255.0f;
          if (bri < MIN_BRI) bri = MIN_BRI;

          auto call = id(display_backlight).turn_on();
          call.set_brightness(bri);
          call.perform();

          // Startzustand: nicht gedimmt, nicht "aus"
          id(dimmed)     = false;
          id(screen_off) = false;
          
esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# Include external components
external_components:
  - source: 
      type: git
      url: https://github.com/shelson/esphome-cst9217
  - source:
      type: git
      url: ${axp2101_repo_url}
      ref: ${axp2101_repo_ref}
    components: [axp2101]
  # Local fallback (development only):
  # - source: my_components
  #   components: [axp2101]

axp2101:
  id: axp2101_component
  model: WS-S3AMOLED175
  address: 0x34
  i2c_id: bus_a
  update_interval: 1100ms  # Use 100ms for responsive power button detection


http_request:
  timeout: 10s
  verify_ssl: false

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret api_encrypt
  reboot_timeout: 0s  
  on_client_connected:
    then:
      - lambda: |-
          if (id(api_clients) < 250) {
            id(api_clients)++;
          }
          if (!id(wifi_is_off)) {
            id(wifi_state) = 2;  // mindestens ein Client -> "connected"
          }
  on_client_disconnected:
    then:
      - lambda: |-
          if (id(api_clients) > 0) {
            id(api_clients)--;
          }
          // Nur wenn wirklich KEIN Client mehr verbunden ist, auf "connecting" zurückfallen
          if (id(api_clients) == 0 && !id(wifi_is_off)) {
            id(wifi_state) = 1;  // connecting
          }
  services:
    - service: pmu_soft_power_off
      then:
        - lambda: |-
            id(axp2101_component).soft_power_off_esp();

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  #level: WARN
  
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: light   # statt none
  reboot_timeout: 0s

time:
  - platform: homeassistant

deep_sleep:
  id: touch_deep_sleep
  wakeup_pin:
    number: GPIO11
    allow_other_uses: true
    mode: INPUT_PULLUP
    inverted: ${touch_wake_inverted}
  wakeup_pin_mode: ${touch_wakeup_pin_mode}

i2c:
  - id: bus_a
    scl: GPIO14
    sda: GPIO15
    frequency: 400kHz
    scan: false

# NOT needed, we are using AXP2101 PKEY events
#pca9554:
#  - id: ioext
#    address: 0x20
#    i2c_id: bus_a

# QSPI configuration for 1.75" AMOLED display
spi:
  - id: display_qspi
    type: quad
    clk_pin: GPIO38
    data_pins:
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7

# Touchscreen Configuration
touchscreen:
  - platform: cst9217
    display: main_display
    id: touch
    interrupt_pin:
      number: GPIO11
      allow_other_uses: true
    reset_pin: GPIO40
    transform:
      mirror_x: true
      mirror_y: true
    on_touch:
      then:
        - script.stop: screen_idle_pipeline
        - lambda: |-
            // Interaktion -> Idle-Zeit / Ultra-Power zurücksetzen
            id(last_touch_ms) = millis();
            id(ultra_power) = false;
            // Wenn WiFi vorher abgeschaltet war -> jetzt wieder einschalten
            if (id(wifi_is_off)) {
              id(wifi_is_off) = false;
              id(wifi_turn_on).execute();
            }
    on_release:
      - script.stop: screen_idle_pipeline   # Idle-Pipeline immer stoppen
      - lambda: |-
          id(last_touch_ms) = millis();
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming from paused idle"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - lambda: |-
                constexpr float MIN_BRI = ${min_bri}f;
                float bri = (float)id(user_brightness) / 255.0f;
                if (bri < MIN_BRI) bri = MIN_BRI;

                auto call = id(display_backlight).turn_on();
                call.set_brightness(bri);
                call.perform();

                id(dimmed)     = false;
                id(screen_off) = false;
          else:
            - if:
                condition:
                  lambda: 'return id(dimmed);'
                then:
                  - logger.log: "LVGL still running, but was dimmed → restore brightness"
                  - lambda: |-
                      constexpr float MIN_BRI = ${min_bri}f;
                      float bri = (float)id(user_brightness) / 255.0f;
                      if (bri < MIN_BRI) bri = MIN_BRI;

                      auto call = id(display_backlight).turn_on();
                      call.set_brightness(bri);
                      call.perform();

                      id(dimmed)     = false;
                      id(screen_off) = false;

# 1.75" Round AMOLED Display Configuration (466x466 with CO5300 Driver)
display:
  - platform: mipi_spi
    model: WAVESHARE-ESP32-S3-TOUCH-AMOLED-1.75
    id: main_display
    spi_id: display_qspi
    data_rate: 80MHz
    auto_clear_enabled: false # Recommended for LVGL
    update_interval: never    # Recommended for most displays with LVGL
    #buffer_size: 1.0

globals:
  - id: api_clients
    type: uint8_t
    restore_value: no
    initial_value: "0"
  - id: wifi_state
    type: uint8_t
    restore_value: no
    initial_value: "1"  # Boot: WiFi an & verbindet sich 
  - id: wifi_is_off
    type: bool
    restore_value: no
    initial_value: "false"  
  - id: ui_built
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ui_col_now
    type: uint32_t
    restore_value: no
    initial_value: "0x00FF00"
  - id: ui_col_target
    type: uint32_t
    restore_value: no
    initial_value: "0x00FF00"
  - id: last_prog
    type: int
    restore_value: no
    initial_value: "0"
  - id: print_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: is_scrolling
    type: bool
    restore_value: no
    initial_value: "false"
  - id: soc_estimate          # aktueller „optimistischer“ SoC in %
    type: float
    restore_value: yes
    initial_value: "50.0"
  - id: usb_present           # aktueller USB-Status
    type: bool
    restore_value: no
    initial_value: "false"
  - id: dimmed           # dimmed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: screen_off
    type: bool
    restore_value: no
    initial_value: "false"
  - id: user_brightness   # user_brightness
    type: int
    restore_value: yes
    initial_value: "225"   # entspricht deiner bisherigen Max-Helligkeit
  - id: ultra_power
    type: bool
    restore_value: no
    initial_value: "false"
#============== Globals FARBEN ======================
  - id: col_ring_printing
    type: uint32_t
    restore_value: yes
    initial_value: "0x00FF00"   # Grün: Printing
  - id: col_ring_done
    type: uint32_t
    restore_value: yes
    initial_value: "0x00FFFF"   # Blau: Done
  - id: col_ring_error_hi
    type: uint32_t
    restore_value: yes
    initial_value: "0xFF3333"   # Hellrot: Error
  - id: col_ring_idle
    type: uint32_t
    restore_value: yes
    initial_value: "0x666666"   # Grau: Idle / Offline
  - id: col_ring_preheat
    type: uint32_t
    restore_value: yes
    initial_value: "0xFFA500"   # Orange: Preheat
  - id: col_ring_clean
    type: uint32_t
    restore_value: yes
    initial_value: "0xFFFFFF"   # Weiß: Clean
  - id: col_ring_level
    type: uint32_t
    restore_value: yes
    initial_value: "0xFFA500"   # Orange: Bed Level
  - id: col_ring_cool
    type: uint32_t
    restore_value: yes
    initial_value: "0x3399FF"   # Hellblau: Cooling
  - id: col_ring_idle_active
    type: uint32_t
    restore_value: yes
    initial_value: "0x00FF00"   # Grün: Job vorhanden, aber Stage idle/offline
  - id: col_ring_filament
    type: uint32_t
    restore_value: yes
    initial_value: "0xFFD54F"   # Gelb: Filament load/unload
  - id: charge_anim_running
    type: bool
    restore_value: no
    initial_value: "false"
  - id: charge_anim_start_ms
    type: int
    restore_value: no
    initial_value: "0"
  - id: page3_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: touch_deep_sleep_enabled
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: cam_fetch_in_flight
    type: bool
    restore_value: no
    initial_value: "false"
  - id: cam_fetch_started_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: cam_fetch_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

script:
  - id: wifi_turn_off
    then:
      - logger.log: "WiFi OFF (idle timeout)"
      - lambda: |-
          id(wifi_state) = 0;
      - wifi.disable:
  - id: wifi_turn_on
    then:
      - logger.log: "WiFi ON (touch wake)"
      - lambda: |-
          id(wifi_is_off) = false;
          id(wifi_state)  = 1;  // erst mal "connecting"
      - wifi.enable:
  - id: publish_power_ha_now
    then:
      - component.update: batt_level_ha
      - component.update: pmu_temp_ha
  - id: wake_display_now
    then:
      - script.stop: screen_idle_pipeline
      - lambda: |-
          id(screen_off)  = false;
          id(dimmed)      = false;
          id(ultra_power) = false;
          id(ui).set_paused(false, false);

          constexpr float MIN_BRI = ${min_bri}f;
          float bri = (float) id(user_brightness) / 255.0f;
          if (bri < MIN_BRI) bri = MIN_BRI;

          auto call = id(display_backlight).turn_on();
          call.set_brightness(bri);
          call.perform();
      - lvgl.widget.redraw:
  - id: screen_idle_pipeline
    mode: restart
    then:
      - logger.log: "Idle Stage 1: dim display (LVGL idle)"
      - lambda: |-
          id(dimmed)      = true;
          id(screen_off)  = false;
          id(ultra_power) = false;

          constexpr float MIN_BRI   = ${min_bri}f;
          constexpr float DIM_FACT  = ${dim_factor}f;

          float bri = (float)id(user_brightness) / 255.0f;
          bri *= DIM_FACT; 
          if (bri < MIN_BRI) bri = MIN_BRI;

          auto call = id(display_backlight).turn_on();
          call.set_brightness(bri);
          call.perform();

      # 15 Minuten später → komplett aus
      - delay: 15min
      - logger.log: "Idle Stage 2: backlight OFF + LVGL pause"
      - light.turn_off: display_backlight
      - lambda: |-
          id(screen_off) = true;

          // Optional: WiFi schlafen legen, wenn auf Akku und kein Druck aktiv
          if (!id(usb_present) && !id(print_active) && !id(wifi_is_off)) {
            id(wifi_is_off) = true;
            id(wifi_turn_off).execute();
          }
      - if:
          condition:
            lambda: 'return id(touch_deep_sleep_enabled) && !id(usb_present) && !id(print_active);'
          then:
            - script.execute: enter_touch_deep_sleep
          else:
            - lvgl.pause:
  - id: enter_touch_deep_sleep
    then:
      - logger.log: "Entering deep sleep (wake: touch INT GPIO11)"
      - lambda: |-
          id(dimmed)      = false;
          id(screen_off)  = true;
          id(ultra_power) = true;
      - light.turn_off: display_backlight
      - if:
          condition:
            lambda: 'return !id(wifi_is_off);'
          then:
            - lambda: |-
                id(wifi_is_off) = true;
                id(wifi_state)  = 0;
            - wifi.disable:
      - lvgl.pause:
      - delay: 300ms
      - deep_sleep.enter: touch_deep_sleep
  - id: pwr_soft_toggle
    then:
      - lambda: |-
          if (id(screen_off) || id(dimmed) || id(ultra_power)) {
            // --- WAKE ---
            ESP_LOGI("pwr_btn", "Soft-Wake");
            id(wake_display_now).execute();

            if (id(wifi_is_off)) {
              id(wifi_is_off) = false;
              id(wifi_state)  = 1;
              id(wifi_turn_on).execute();
            }
          } else {
            // --- SLEEP ---
            ESP_LOGI("pwr_btn", "Soft-Sleep");
            id(screen_idle_pipeline).stop();

            // Flags VOR dem Ausschalten setzen, damit user_brightness nicht 0 wird
            id(dimmed)      = false;
            id(screen_off)  = true;
            id(ultra_power) = true;

            auto call = id(display_backlight).turn_off();
            call.perform();

            id(ui).set_paused(true, false);

            if (!id(usb_present) && !id(print_active) && !id(wifi_is_off)) {
              ESP_LOGI("pwr_btn", "Soft-Sleep: turning WiFi OFF");
              id(wifi_is_off) = true;
              id(wifi_state)  = 0;
              id(wifi_turn_off).execute();
            }
            if (id(touch_deep_sleep_enabled) && !id(usb_present) && !id(print_active)) {
              ESP_LOGI("pwr_btn", "Soft-Sleep -> Deep-Sleep (touch wake)");
              id(enter_touch_deep_sleep).execute();
            }
          }

image:
  - file: ${bambulab_icon}
    id: img_bambu_logo
    type: RGB565
  - file: images/bambuicon.png  # neutraler Platzhalter (z.B. schwarz/transparent)
    id: img_placeholder
    type: RGB565


# ---------- HA-Entities ----------
switch:
  - platform: template
    name: "PrintSphere: Dimmen beim Laden"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
  - platform: template
    name: "PrintSphere: Deep Sleep via Touch"
    lambda: |-
      return id(touch_deep_sleep_enabled);
    turn_on_action:
      - lambda: |-
          id(touch_deep_sleep_enabled) = true;
    turn_off_action:
      - lambda: |-
          id(touch_deep_sleep_enabled) = false;
    entity_category: config

output:
  - platform: template
    id: backlight_brightness
    type: float
    write_action:
      then:
        - lambda: |-
            float val = state;  // 0.0–1.0 vom Light
            // Hard-Minimum: nicht dunkler als min_bri, solange das Licht an ist
            if (val > 0.0f && val < ${min_bri}f) {
              val = ${min_bri}f;
            }
            if (val > 1.0f) val = 1.0f;

            int hw_val = (int) lroundf(val * 255.0f);
            if (hw_val < 0)   hw_val = 0;
            if (hw_val > 255) hw_val = 255;

            id(main_display).set_brightness(hw_val);

            if (!id(screen_off) && !id(dimmed) && !id(ultra_power)) {
              id(user_brightness) = hw_val;
            }
  - platform: template
    id: out_printing_r
    type: float
    write_action:
      - lambda: |-
          float s = state;  // 0.0–1.0
          uint8_t r = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_printing);
          uint8_t g = (col >> 8) & 0xFF;
          uint8_t b =  col       & 0xFF;
          id(col_ring_printing) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_printing_g
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t g = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_printing);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t b =  col        & 0xFF;
          id(col_ring_printing) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_printing_b
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t b = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_printing);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t g = (col >> 8)  & 0xFF;
          id(col_ring_printing) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
# -------- DONE (col_ring_done) --------
  - platform: template
    id: out_done_r
    type: float
    write_action:
      - lambda: |-
          float s = state;  // 0.0–1.0
          uint8_t r = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_done);
          uint8_t g = (col >> 8) & 0xFF;
          uint8_t b =  col       & 0xFF;
          id(col_ring_done) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_done_g
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t g = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_done);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t b =  col        & 0xFF;
          id(col_ring_done) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_done_b
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t b = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_done);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t g = (col >> 8)  & 0xFF;
          id(col_ring_done) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  # -------- ERROR (col_ring_error_hi) --------
  - platform: template
    id: out_error_r
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t r = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_error_hi);
          uint8_t g = (col >> 8) & 0xFF;
          uint8_t b =  col       & 0xFF;
          id(col_ring_error_hi) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_error_g
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t g = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_error_hi);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t b =  col        & 0xFF;
          id(col_ring_error_hi) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_error_b
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t b = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_error_hi);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t g = (col >> 8)  & 0xFF;
          id(col_ring_error_hi) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  # -------- IDLE (col_ring_idle) --------
  - platform: template
    id: out_idle_r
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t r = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_idle);
          uint8_t g = (col >> 8) & 0xFF;
          uint8_t b =  col       & 0xFF;
          id(col_ring_idle) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_idle_g
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t g = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_idle);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t b =  col        & 0xFF;
          id(col_ring_idle) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_idle_b
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t b = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_idle);
          uint8_t r = (col >> 16) & 0xFF;
          uint8_t g = (col >> 8)  & 0xFF;
          id(col_ring_idle) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  # -------- PREHEAT (col_ring_preheat) --------
  - platform: template
    id: out_preheat_r
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t r = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_preheat);
          uint8_t g = (col >> 8) & 0xFF;
          uint8_t b =  col       & 0xFF;
          id(col_ring_preheat) = ((uint32_t)r << 16) | ((uint32_t)g << 8) | b;
  - platform: template
    id: out_preheat_g
    type: float
    write_action:
      - lambda: |-
          float s = state;
          uint8_t g = (uint8_t) roundf(s * 255.0f);
          uint32_t col = id(col_ring_preheat);
