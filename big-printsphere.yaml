sensor:
  - platform: axp2101
    axp2101_id: axp2101_component
    battery_voltage:
      name: "Battery Voltage (raw)"
      internal: true
    battery_level:
      id: axp_batt_level
      name: "Battery Level (raw)"
      internal: true
    temperature:
      id: axp_pmu_temp
      name: "PMU Temperature (raw)"
      internal: true
  - platform: template
    id: batt_level_ha
    name: "big_printsphere_battery_level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 15s
    lambda: |-
      if (!id(axp_batt_level).has_state()) return NAN;
      return id(axp_batt_level).state;
  - platform: template
    id: pmu_temp_ha
    name: "PMU Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 30s
    lambda: |-
      if (!id(axp_pmu_temp).has_state()) return NAN;
      return id(axp_pmu_temp).state;
  - platform: homeassistant
    id: print_progress
    entity_id: sensor.${bambulab_printer}_print_progress
    internal: true
    on_value:
      then:
        - lambda: |-
            static bool job_active = false;
            float p = id(print_progress).state;  // aktueller Fortschritt
            // --- Job startet oder ESP kommt dazu, während Job läuft ---
            if (!job_active && p > 0.5f) {
              job_active = true;
              ESP_LOGD("preview", "Neuer/aktiver Druck erkannt (progress=%.1f) -> Bild laden", p);
              // aktuelle URL aus ha_img_url nehmen
              std::string raw(id(ha_img_url).state.c_str());
              if (raw.empty()) {
                ESP_LOGW("preview", "ha_img_url leer, kann kein Bild laden");
                return;
              }
              // Vollständige URL bauen (raw enthält "/api/image_proxy/...")
              std::string full = std::string("${homeassistant_url}") + raw;
              ESP_LOGD("preview", "set_url(%s)", full.c_str());
              id(ha_preview).set_url(full.c_str());
              id(ha_preview).update();
            }
            // --- Job offensichtlich beendet / abgebrochen ---
            if (job_active && p <= 0.5f) {
              job_active = false;
              ESP_LOGD("preview", "Druck beendet oder gestoppt (progress=%.1f)", p);
            }

  - platform: homeassistant
    id: nozzle_temp
    entity_id: sensor.${bambulab_printer}_nozzle_temperature
    internal: true
  - platform: homeassistant
    id: bed_temp
    entity_id: sensor.${bambulab_printer}_bed_temperature
    internal: true
  - platform: homeassistant
    id: remaining_time
    entity_id: sensor.${bambulab_printer}_remaining_time
    internal: true
  - platform: homeassistant
    id: current_layer
    entity_id: sensor.${bambulab_printer}_current_layer
    internal: true
  - platform: homeassistant
    id: total_layer
    entity_id: sensor.${bambulab_printer}_total_layer_count
    internal: true

online_image:
  - id: ha_preview
    # Start-URL ist egal – wir überschreiben sie gleich via set_url
    url: "http://127.0.0.1/blank.png"
    format: PNG
    type: RGB565
    resize: 420x420
    placeholder: img_placeholder
    update_interval: 24h
    request_headers:
      Accept: image/png,image/jpeg;q=0.9,*/*;q=0.1
      Accept-Encoding: identity
    on_download_finished:
      then:
        - lambda: |-
            using namespace esphome::lvgl;
            // UI noch nicht gebaut? Dann nur still fertig werden, aber nichts zeichnen
            if (!id(ui_built)) {
              ESP_LOGD("preview", "download finished, but UI not built yet → skip render");
              return;
            }
            // Wenn Bildschirm aus oder Ultra-Power aktiv → nichts rendern
            if (id(screen_off) || id(ultra_power)) {
              return;
            }

            // Bild zuweisen
            lv_img_set_src(id(img_preview), id(ha_preview));

            // Scroll/Touch sicher aus
            lv_obj_set_scrollbar_mode(id(img_mask), LV_SCROLLBAR_MODE_OFF);
            lv_obj_clear_flag(id(img_mask), LV_OBJ_FLAG_SCROLLABLE | LV_OBJ_FLAG_CLICKABLE);
            lv_obj_clear_flag(id(img_preview), LV_OBJ_FLAG_SCROLLABLE | LV_OBJ_FLAG_CLICKABLE);

            // Hinweis ausblenden
            lv_obj_add_flag(id(page2_note), LV_OBJ_FLAG_HIDDEN);

            // Zoom zurücksetzen, dann Größe lesen
            lv_img_set_zoom(id(img_preview), 256);  // 256 = 1.0x
            int w = lv_obj_get_width(id(img_preview));
            int h = lv_obj_get_height(id(img_preview));

            if (w > 0 && h > 0) {
              const int D = 420;
              int z_w = (D * 256 + w - 1) / w;   // ceil(D/w)
              int z_h = (D * 256 + h - 1) / h;   // ceil(D/h)
              int z   = (z_w > z_h) ? z_w : z_h; // COVER

              if (z < 16)   z = 16;
              if (z > 1024) z = 1024;
              lv_img_set_zoom(id(img_preview), z);
            }

            lv_obj_center(id(img_preview));
            lv_obj_invalidate(id(img_preview));
  - id: ha_cam
    url: "http://127.0.0.1/blank.jpg"
    format: JPEG
    type: RGB565
    resize: 400x225
    placeholder: img_placeholder
    update_interval: never
    request_headers:
      Authorization: !secret ha_auth_header
      Accept: image/jpeg
      Accept-Encoding: identity
    on_download_finished:
      then:
        - lambda: |-
            using namespace esphome::lvgl;
            id(cam_fetch_in_flight) = false;
            if (!id(ui_built)) return;
            if (id(screen_off) || id(ultra_power)) return;
            // WICHTIG: während Scroll oder wenn Page3 nicht aktiv -> NICHT rendern
            if (id(is_scrolling) || !id(page3_active)) return;
            lv_img_set_src(id(img_cam), id(ha_cam));
            // Feed größer darstellen (ohne höhere Download-Last): in einen Zielbereich einpassen
            lv_img_set_zoom(id(img_cam), 256);  // 1.0x
            int w = lv_obj_get_width(id(img_cam));
            int h = lv_obj_get_height(id(img_cam));
            if (w > 0 && h > 0) {
              const int TARGET_W = 440;
              const int TARGET_H = 248;
              int z_w = (TARGET_W * 256) / w;   // contain by width
              int z_h = (TARGET_H * 256) / h;   // and max height
              int z   = (z_w < z_h) ? z_w : z_h;
              if (z < 64)   z = 64;
              if (z > 1024) z = 1024;
              lv_img_set_zoom(id(img_cam), z);
            }
            lv_obj_align(id(img_cam), LV_ALIGN_CENTER, 0, 30);
            lv_obj_invalidate(id(img_cam));


